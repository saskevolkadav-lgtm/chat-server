<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Вход</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#2f2f2f;
color:white;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center
}

.box{
width:min(92vw,420px);
background:#3b3b3b;
border-radius:14px;
padding:24px
}

h1{
margin:0 0 16px;
text-align:center
}

input{
width:100%;
padding:12px;
border:none;
border-radius:8px;
margin-bottom:10px;
box-sizing:border-box
}

.row{
display:flex;
gap:10px;
margin-top:10px
}

button{
flex:1;
padding:12px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold
}

.loginBtn{background:orange}
.regBtn{background:#6b7a8f;color:white}

label{
display:flex;
align-items:center;
gap:8px;
margin-top:6px;
margin-bottom:8px;
color:#ddd
}

#msg{
margin-top:12px;
min-height:20px;
color:#ffb3b3
}
</style>
</head>

<body>

<div class="box">

<h1>Вход / Регистрация</h1>

<input id="login" placeholder="Логин">
<input id="password" type="password" placeholder="Пароль">

<label>
<input id="remember" type="checkbox" style="width:auto;margin:0">
Запомнить меня
</label>

<div class="row">
<button class="loginBtn" id="loginBtn">Войти</button>
<button class="regBtn" id="registerBtn">Регистрация</button>
</div>

<div id="msg"></div>

</div>

<script>

const loginInput = document.getElementById("login");
const passwordInput = document.getElementById("password");
const rememberInput = document.getElementById("remember");

const loginBtn = document.getElementById("loginBtn");
const registerBtn = document.getElementById("registerBtn");

const msg = document.getElementById("msg");

async function send(url){

msg.textContent="";

const login = loginInput.value.trim();
const password = passwordInput.value.trim();

if(!login || !password){
msg.textContent="Введите логин и пароль";
return;
}

loginBtn.disabled=true;
registerBtn.disabled=true;

try{

const res = await fetch(url,{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({
login,
password,
remember:rememberInput.checked
})
});

const data = await res.json();

if(!res.ok){
msg.textContent = data.error || "Ошибка";
loginBtn.disabled=false;
registerBtn.disabled=false;
return;
}

location.href="/chat.html";

}catch(e){

msg.textContent="Ошибка соединения";

loginBtn.disabled=false;
registerBtn.disabled=false;

}

}

loginBtn.onclick=()=>send("/api/login");
registerBtn.onclick=()=>send("/api/register");

loginInput.addEventListener("keypress",e=>{
if(e.key==="Enter") send("/api/login")
});

passwordInput.addEventListener("keypress",e=>{
if(e.key==="Enter") send("/api/login")
});

fetch("/api/me")
.then(r=>r.json())
.then(data=>{
if(data.loggedIn){
location.href="/chat.html";
}
});

</script>

</body>
</html>
